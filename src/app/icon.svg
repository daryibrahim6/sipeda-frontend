<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!--
    SIPEDA favicon — identik dengan navbar:
    - Navbar: w-8 h-8 bg-red-600 rounded-lg (rounded-lg = border-radius: 8px pada 32px = 25%)
    - rounded-lg pada 100px icon = rx="25"
    - Lucide Droplets: viewBox 0 0 24 24, fill-white + text-white
  -->
  <rect width="100" height="100" rx="25" fill="#DC2626"/>
  <!--
    Lucide Droplets paths (exact dari lucide.dev v0.469)
    Scale: icon Lucide 24x24 → centered dalam 100x100
    Target area: 62x62px centered → scale = 62/24 = 2.583
    Translate supaya content (x:3-21, y:3-17) centered:
      content width ≈ 18, height ≈ 14
      scaled: 18*2.583=46.5, 14*2.583=36.2
      offset x: (100-46.5)/2 - 3*2.583 = 26.75 - 7.75 = 19
      offset y: (100-36.2)/2 - 3*2.583 = 31.9 - 7.75 = 24
  -->
  <g transform="translate(19, 18) scale(2.58)"
     fill="white"
     stroke="white"
     stroke-width="1.2"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
    <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
  </g>
</svg>
